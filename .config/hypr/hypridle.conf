general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim backlight to 30% after 60s idle, on battery only. brightnessctl -s saves
# the current value so -r restores exactly what the user had set.
# No-op on desktops (no AC adapter at /sys/class/power_supply/A*).
listener {
    timeout = 60
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/A*/online 2>/dev/null | head -n1)" = "0" ] && brightnessctl -s set 30%'
    on-resume = sh -c 'brightnessctl -r 2>/dev/null || true'
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = hyprlock
}

# Turn off display after 5.5 minutes
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 10 minutes, but only when on battery.
# On a desktop (no battery) AC is always online, so this never fires.
# Hibernate could replace `systemctl suspend` here once a resume target is configured.
listener {
    timeout = 600
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/A*/online 2>/dev/null | head -n1)" = "0" ] && systemctl suspend'
}
