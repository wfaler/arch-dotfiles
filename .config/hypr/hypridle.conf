# hypridle - Hyprland native idle daemon
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid duplicate hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn screen on after resume
}

listener {
    timeout = 150                               # 2.5min: dim screen
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 300                               # 5min: lock screen
    on-timeout = loginctl lock-session
}

listener {
    timeout = 330                               # 5.5min: turn off display
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 1800                              # 30min: suspend
    on-timeout = systemctl suspend
}
