# Integrated GUI + JVM dev box: IntelliJ IDEA Ultimate + Scala/Kotlin/Java toolchain.
#
# Unlike the isolated podman nvim-box, this distrobox SHARES $HOME and the host
# display/dbus/GPU on purpose -- that is what makes GUI apps like IntelliJ work
# and lets `distrobox-export` drop them into the host launcher.
#
# Build / refresh:
#   distrobox assemble create --file ~/dotfiles/distrobox/distrobox.ini

[arch-dev]
image=quay.io/archlinux/archlinux:latest
pull=true
start_now=true
root=false
replace=false
# Flip to true on the Nvidia desktop so the box gets the host GPU userspace.
nvidia=false

# Official-repo toolchains + GUI/runtime bits. AUR pieces are handled in setup.sh.
# Python uses uv (not pip), per preference.
additional_packages=base-devel git curl wget unzip which sudo gradle kotlin scala maven rustup go nodejs npm uv ripgrep fd ttf-dejavu noto-fonts

# Provision AUR bits (IntelliJ Ultimate + AUR-only JVM tools) via paru. init_hooks
# run as root, so we invoke the script by absolute path (uid 1000's home) and the
# script drops to that user, because makepkg refuses to run as root.
init_hooks=bash "$(getent passwd 1000 | cut -d: -f6)/dotfiles/distrobox/setup.sh"

# Put IntelliJ into the host application launcher.
exported_apps=intellij-idea-ultimate-edition
